name: wss Test Service

on:
  workflow_dispatch:

env:
  NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
  WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}

jobs:
  start-wss-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检查 Secrets
        run: |
          if [ -z "$NGROK_AUTH_TOKEN" ]; then
            echo "❌ NGROK_AUTH_TOKEN 未设置"
            exit 1
          fi
          echo "✅ NGROK_AUTH_TOKEN 已设置 (长度: ${#NGROK_AUTH_TOKEN})"

      - name: 测试 ngrok 认证
        run: |
          curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar xzf ngrok.tgz
          chmod +x ngrok
          
          # 测试认证是否有效
          echo "测试 ngrok 认证..."
          ./ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ./ngrok config check
          echo "✅ ngrok 认证测试完成"

      - name: 启动简单 HTTP 服务器
        run: |
          python3 -m http.server 8765 &
          echo $! > http.pid
          sleep 2
          curl -s http://localhost:8765 > /dev/null && echo "✅ HTTP 服务器运行正常"

      - name: 启动 ngrok
        run: |
          # 前台运行 ngrok 并输出日志
          ./ngrok http 8765 --log=stdout 2>&1 | tee ngrok.log &
          NGROK_PID=$!
          echo "NGROK_PID=$NGROK_PID" >> $GITHUB_ENV
          
          echo "等待 ngrok 启动..."
          for i in {1..30}; do
            sleep 1
            if curl -s http://localhost:4040/api/tunnels 2>/dev/null; then
              echo "✅ ngrok API 就绪"
              break
            fi
            echo "等待中... ($i/30)"
          done
          
          # 显示隧道信息
          echo ""
          echo "=== ngrok 隧道信息 ==="
          curl -s http://localhost:4040/api/tunnels | jq . || echo "无法获取隧道信息"
          echo ""
          
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')
          
          if [ -n "$NGROK_URL" ]; then
            WSS_URL=$(echo "$NGROK_URL" | sed 's/https/wss/')
            echo "WSS_URL=$WSS_URL" >> $GITHUB_ENV
            echo "✅ 获取到地址: $WSS_URL"
          else
            echo "❌ 无法获取 ngrok URL"
            echo ""
            echo "=== ngrok 日志 ==="
            cat ngrok.log
            exit 1
          fi

      - name: 发送微信通知
        if: env.WSS_URL != ''
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✅ WebSocket 服务已上线\n地址: $WSS_URL\",
              \"contentType\": 2,
              \"appToken\": \"$WXPUSH_TOKEN\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"]
            }"

      - name: 保持运行
        if: env.WSS_URL != ''
        run: |
          echo "服务运行中，20分钟后关闭..."
          sleep 1200