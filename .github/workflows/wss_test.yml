name: WSS via ngrok

on:
  workflow_dispatch:
    inputs:
      port:
        description: "本地 WebSocket 端口"
        required: false
        default: "8080"

jobs:
  wss:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 纯 YAML 内直接启动 WebSocket Server
      - name: Start WebSocket Server
        run: |
          npm install ws

          cat > server.js <<'EOF'
          const WebSocket = require('ws');

          const port = process.env.PORT || 8080;

          const wss = new WebSocket.Server({
            port
          });

          console.log("WS Server Started:", port);

          wss.on('connection', (ws) => {
            console.log('Client connected');

            ws.send('hello from github actions');

            ws.on('message', (msg) => {
              console.log('recv:', msg.toString());
              ws.send('echo: ' + msg);
            });

            ws.on('close', () => {
              console.log('client disconnected');
            });
          });

          setInterval(() => {}, 1000);
          EOF

          node server.js &

      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
          | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null

          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
          | sudo tee /etc/apt/sources.list.d/ngrok.list

          sudo apt update
          sudo apt install ngrok

      - name: Configure ngrok
        run: ngrok config add-authtoken $NGROK_AUTH_TOKEN

      - name: Start ngrok tunnel
        run: |
          ngrok tcp ${{ github.event.inputs.port || '8080' }} > /dev/null &

      - name: Wait ngrok
        run: sleep 8

      - name: Get WSS Address
        run: |
          curl -s http://127.0.0.1:4040/api/tunnels > tunnels.json

          HOST=$(cat tunnels.json | jq -r '.tunnels[0].public_url')

          echo ""
          echo "=============================="
          echo "NGROK TCP:"
          echo "$HOST"
          echo ""
          echo "WSS URL:"
          echo "$HOST"
          echo "=============================="

      - name: Keep Alive
        run: |
          echo "Running..."
          while true; do
            sleep 60
          done