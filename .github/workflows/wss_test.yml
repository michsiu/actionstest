name: wss Test Service

on:
  workflow_dispatch:

jobs:
  start-wss-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create WebSocket server
        run: |
          npm install ws
          cat > server.js << 'EOF'
          const WebSocket = require('ws');
          const wss = new WebSocket.Server({ port: 8765 });
          console.log('✅ WebSocket 服务运行在端口 8765');
          wss.on('connection', (ws) => {
            console.log('✅ 客户端已连接');
            ws.send(JSON.stringify({ type: 'system', content: '已连接' }));
            ws.on('message', (msg) => {
              console.log('收到:', msg.toString());
              ws.send(JSON.stringify({ type: 'echo', content: msg.toString() }));
            });
          });
          EOF
          node server.js &
          echo $! > server.pid
          sleep 2
          echo "✅ 服务已启动"

      - name: Install ngrok
        run: |
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          chmod +x ngrok
          ./ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start ngrok
        run: |
          ./ngrok http 8765 &
          sleep 10
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          WSS_URL=$(echo $NGROK_URL | sed 's/https/wss/')
          echo "WSS_URL=$WSS_URL" >> $GITHUB_ENV
          echo "============================================"
          echo "✅ WebSocket 地址: $WSS_URL"
          echo "============================================"

      - name: Send WxPush
        env:
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✅ WebSocket 服务已上线\n地址: $WSS_URL\",
              \"contentType\": 2,
              \"appToken\": \"$WXPUSH_TOKEN\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"]
            }"

      - name: Keep alive
        run: |
          echo "服务运行中，等待超时..."
          sleep 1800