name: wss Test Service

on:
  workflow_dispatch:

env:
  NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
  WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}

jobs:
  start-wss-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 下载 ngrok
        run: |
          curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar xzf ngrok.tgz
          chmod +x ngrok
          echo "✅ ngrok 下载完成"

      - name: 直接设置 token（最简单方式）
        run: |
          # 创建配置目录
          mkdir -p /home/runner/.config/ngrok
          
          # 直接写入配置文件
          cat > /home/runner/.config/ngrok/ngrok.yml << EOF
          version: "2"
          authtoken: ${{ secrets.NGROK_AUTH_TOKEN }}
          EOF
          
          # 显示配置文件内容（隐藏 token 大部分）
          echo "配置文件已创建:"
          cat /home/runner/.config/ngrok/ngrok.yml | sed 's/authtoken: .*/authtoken: ***已设置***/'
          
          # 测试 token 是否有效
          echo ""
          echo "测试 token..."
          ./ngrok config check || echo "⚠️ token 验证失败，但继续尝试"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 创建 WebSocket 服务器
        run: |
          npm install ws
          cat > server.js << 'EOF'
          const WebSocket = require('ws');
          const wss = new WebSocket.Server({ port: 8765 });
          console.log('WebSocket 服务运行在端口 8765');
          wss.on('connection', (ws) => {
            console.log('客户端已连接');
            ws.send(JSON.stringify({ type: 'system', content: '连接成功' }));
            ws.on('message', (msg) => {
              console.log('收到:', msg.toString());
              ws.send(JSON.stringify({ type: 'echo', content: msg.toString() }));
            });
          });
          EOF
          node server.js &
          sleep 3
          echo "✅ WebSocket 服务已启动"

      - name: 启动 ngrok 并获取地址
        run: |
          echo "启动 ngrok..."
          
          # 使用环境变量方式设置 token（备用方案）
          export NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}
          
          # 启动 ngrok
          ./ngrok http 8765 --log=stdout 2>&1 | tee ngrok.log &
          NGROK_PID=$!
          
          echo "等待 ngrok 启动..."
          sleep 15
          
          # 检查进程
          if ! kill -0 $NGROK_PID 2>/dev/null; then
            echo "❌ ngrok 进程已退出"
            echo ""
            echo "=== ngrok 日志 ==="
            cat ngrok.log
            exit 1
          fi
          
          # 尝试获取 URL
          for i in {1..20}; do
            if curl -s http://localhost:4040/api/tunnels > /dev/null 2>&1; then
              NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')
              if [ -n "$NGROK_URL" ]; then
                echo "✅ 获取到地址"
                break
              fi
            fi
            echo "等待中... ($i/20)"
            sleep 2
          done
          
          if [ -z "$NGROK_URL" ]; then
            echo "❌ 无法获取 ngrok URL"
            echo ""
            echo "=== ngrok 日志 ==="
            cat ngrok.log
            exit 1
          fi
          
          WSS_URL=$(echo "$NGROK_URL" | sed 's/https/wss/')
          echo "WSS_URL=$WSS_URL" >> $GITHUB_ENV
          
          echo ""
          echo "============================================"
          echo "✅ WebSocket 地址: $WSS_URL"
          echo "============================================"

      - name: 发送微信通知
        if: env.WSS_URL != ''
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✅ WebSocket 服务已上线\n地址: $WSS_URL\",
              \"contentType\": 2,
              \"appToken\": \"$WXPUSH_TOKEN\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"]
            }"

      - name: 保持运行
        if: env.WSS_URL != ''
        run: |
          echo "服务运行中，30分钟后关闭..."
          sleep 1800