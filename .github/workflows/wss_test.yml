name: wss Test Service (Pure WebSocket + ngrok + WxPush)

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: '服务运行超时（分钟）'
        required: false
        default: 30
        type: number

jobs:
  start-wss-test:
    runs-on: ubuntu-latest
    # timeout-minutes 已移除，使用默认的 360 分钟

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: WxPush - Service starting
        env:
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"summary\": \"\",
              \"content\": \"🧪 wss 测试服务正在启动...\n仓库: ${{ github.repository }}\n触发者: ${{ github.actor }}\",
              \"contentType\": 2,
              \"appToken\": \"${WXPUSH_TOKEN}\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"],
              \"verifyPayType\": 0,
              \"topicIds\": [],
              \"verifyPay\": false,
              \"url\": \"\"
            }"

      - name: Create test WebSocket server (Node.js)
        run: |
          cat > wss-test-server.js << 'EOF'
          const WebSocket = require('ws');
          const wss = new WebSocket.Server({ port: 8765 });
          
          console.log('🚀 WebSocket 测试服务已启动在端口 8765');
          
          wss.on('connection', (ws, req) => {
            const ip = req.socket.remoteAddress;
            const time = new Date().toLocaleString('zh-CN');
            console.log(`✅ 新客户端连接: ${ip} at ${time}`);
            
            ws.send(JSON.stringify({
              type: 'system',
              content: `✅ 已连接到测试服务\n时间: ${time}\nIP: ${ip}`
            }));
            
            ws.on('message', (data) => {
              const msg = data.toString();
              console.log(`📩 收到消息: ${msg}`);
              
              ws.send(JSON.stringify({
                type: 'echo',
                content: msg,
                timestamp: new Date().toISOString()
              }));
              
              if (msg.toLowerCase() === 'ping') {
                ws.send(JSON.stringify({
                  type: 'pong',
                  content: '🏓 pong!',
                  timestamp: new Date().toISOString()
                }));
              }
            });
            
            ws.on('close', () => {
              console.log(`❌ 客户端断开: ${ip}`);
            });
            
            ws.on('error', (err) => {
              console.error(`⚠️ WebSocket 错误: ${err.message}`);
            });
          });
          
          setInterval(() => {
            console.log(`📊 当前连接数: ${wss.clients.size}`);
          }, 30000);
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install WebSocket library
        run: npm install ws

      - name: Start WebSocket test server
        run: |
          node wss-test-server.js &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 3
          
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ WebSocket 测试服务已启动 (PID: $SERVER_PID)"
          else
            echo "❌ 服务启动失败"
            exit 1
          fi

      - name: Download and setup ngrok
        run: |
          curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar xzf ngrok.tgz
          chmod +x ngrok
          ./ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start ngrok tunnel
        run: |
          ./ngrok http 8765 --log=stdout --log-level=info &
          NGROK_PID=$!
          echo "NGROK_PID=$NGROK_PID" >> $GITHUB_ENV
          
          echo "⏳ 等待 ngrok 隧道建立..."
          for i in {1..30}; do
            sleep 1
            if curl -s http://localhost:4040/api/tunnels > /dev/null 2>&1; then
              echo "✅ ngrok API 已就绪"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ ngrok 启动超时"
              exit 1
            fi
          done
          
          sleep 2
          for i in {1..10}; do
            NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
            if [ -n "$NGROK_URL" ] && [ "$NGROK_URL" != "null" ]; then
              echo "✅ 获取到 ngrok 地址"
              echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
              break
            fi
            echo "⚠️ 第 $i 次尝试获取地址失败"
            sleep 2
          done

      - name: Generate WebSocket URLs
        if: env.NGROK_URL != ''
        run: |
          WSS_URL=$(echo "$NGROK_URL" | sed 's/https:/wss:/')
          echo "WSS_URL=$WSS_URL" >> $GITHUB_ENV
          
          echo ""
          echo "============================================"
          echo "✅ WebSocket 测试服务已上线"
          echo "🔗 WebSocket 地址: $WSS_URL"
          echo "🔗 HTTP 地址: $NGROK_URL"
          echo "============================================"
          echo ""

      - name: WxPush - Service ready
        if: env.NGROK_URL != ''
        env:
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"summary\": \"\",
              \"content\": \"✅ wss 测试服务已上线\n\nWebSocket 地址: ${WSS_URL}\nHTTP 地址: ${NGROK_URL}\n\n测试方法:\n1. 使用 WebSocket 客户端连接\n2. 发送任意消息，服务器会回显\n3. 发送 ping 会收到 pong\n\n服务将运行 ${{ inputs.timeout_minutes }} 分钟后自动关闭\",
              \"contentType\": 2,
              \"appToken\": \"${WXPUSH_TOKEN}\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"],
              \"verifyPayType\": 0,
              \"topicIds\": [],
              \"verifyPay\": false,
              \"url\": \"\"
            }"

      - name: WxPush - Service failed
        if: env.NGROK_URL == ''
        env:
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"summary\": \"\",
              \"content\": \"❌ wss 测试服务启动失败\n\n无法获取 ngrok 公网地址\n请检查 NGROK_AUTH_TOKEN 是否正确设置\",
              \"contentType\": 2,
              \"appToken\": \"${WXPUSH_TOKEN}\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"],
              \"verifyPayType\": 0,
              \"topicIds\": [],
              \"verifyPay\": false,
              \"url\": \"\"
            }"
          exit 1

      - name: Keep service running
        run: |
          echo "🟢 测试服务运行中..."
          echo "📊 监控地址: http://localhost:4040/api/tunnels"
          
          END_TIME=$((SECONDS + ${{ inputs.timeout_minutes }} * 60))
          
          while [ ! -f /tmp/stop ] && [ $SECONDS -lt $END_TIME ]; do
            sleep 10
            if [ $((SECONDS % 30)) -eq 0 ]; then
              echo "💓 服务运行中... 已运行 $((SECONDS / 60)) 分钟"
            fi
          done
          
          if [ -f /tmp/stop ]; then
            echo "🛑 收到停止信号"
          else
            echo "⏰ 超时自动关闭"
          fi

      - name: Cleanup
        if: always()
        run: |
          kill $SERVER_PID $NGROK_PID 2>/dev/null || true
          sleep 2
          echo "✅ 服务已完全关闭"

      - name: WxPush - Service closed
        if: always()
        env:
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"summary\": \"\",
              \"content\": \"🛑 wss 测试服务已关闭\n运行ID: ${{ github.run_id }}\",
              \"contentType\": 2,
              \"appToken\": \"${WXPUSH_TOKEN}\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"],
              \"verifyPayType\": 0,
              \"topicIds\": [],
              \"verifyPay\": false,
              \"url\": \"\"
            }"