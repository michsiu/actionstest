name: wss Audio Transcription Service (WebSocket + ngrok + WxPush)

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: '服务运行超时（分钟）'
        required: false
        type: number
        default: 120

env:
  PYTHON_VERSION: '3.10'

jobs:
  start-transcribe-service:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ========== 缓存 ffmpeg（系统依赖） ==========
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/ffmpeg
            /usr/bin/ffprobe
          key: ffmpeg-cache-${{ runner.os }}-v1

      # ========== 缓存 Python 依赖包 ==========
      - name: Cache Python dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-cache-${{ runner.os }}-

      # ========== 安装系统依赖（仅在缓存未命中时） ==========
      - name: Install system dependencies
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq

      # ========== 验证 ffmpeg（无论是否命中缓存都执行） ==========
      - name: Verify ffmpeg
        run: |
          ffmpeg -version | head -1
          jq --version

      # ========== 安装 Python 依赖（仅在缓存未命中时） ==========
      - name: Install Python dependencies
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          pip install --upgrade pip
          pip install websockets requests pycryptodome modelscope funasr torch torchaudio

      # ========== 验证 Python 依赖（可选） ==========
      - name: Verify Python dependencies
        run: |
          python -c "import websockets, requests, Crypto, modelscope, funasr, torch; print('✅ All Python packages loaded')"

      - name: WxPush - Service starting
        env:
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
        run: |
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"summary\": \"\",
              \"content\": \"🎙️ wss 转录服务正在启动...\n仓库: ${{ github.repository }}\n触发者: ${{ github.actor }}\",
              \"contentType\": 2,
              \"appToken\": \"${WXPUSH_TOKEN}\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"],
              \"verifyPayType\": 0,
              \"topicIds\": [],
              \"verifyPay\": false,
              \"url\": \"\"
            }"

      - name: Create runtime directory
        run: |
          mkdir -p tmp_uploads logs

      - name: Start WebSocket transcription server
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
        run: |
          # ========== 启动 Python WebSocket 服务 ==========
          echo "🚀 启动 WebSocket 转录服务..."
          python wss_transcribe_server.py &
          SERVER_PID=$!
          sleep 5

          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ 转录服务已启动 (PID: $SERVER_PID)"
          else
            echo "❌ 服务启动失败"
            exit 1
          fi

          # ========== 清除旧 ngrok 配置，强制获取新 URL ==========
          echo "🔄 清除旧 ngrok 配置..."
          pkill -f ngrok || true
          rm -rf ~/.ngrok2
          sleep 3

          # ========== 下载并启动 ngrok（强制新隧道） ==========
          curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar xzf ngrok.tgz
          chmod +x ngrok
          
          # 重新认证
          ./ngrok config add-authtoken $NGROK_AUTH_TOKEN
          
          # 使用随机端口 + 时间戳强制新隧道
          RANDOM_PORT=$((8765 + RANDOM % 200))
          echo "🔄 使用随机端口: $RANDOM_PORT"
          
          # 启动 ngrok（添加 --random 参数强制随机子域名）
          ./ngrok http $RANDOM_PORT --log=stdout --log-level=info --random &
          NGROK_PID=$!

          # 等待 ngrok 就绪
          for i in {1..30}; do
            sleep 1
            if curl -s http://localhost:4040/api/tunnels > /dev/null 2>&1; then
              break
            fi
          done

          # 获取新 URL（重试机制确保获取到新地址）
          for retry in {1..5}; do
            NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
            if [[ "$NGROK_URL" != "null" && -n "$NGROK_URL" ]]; then
              echo "✅ 获取到 URL: $NGROK_URL"
              break
            fi
            echo "⚠️ 重试获取 URL ($retry/5)..."
            sleep 2
          done
          
          if [[ -z "$NGROK_URL" || "$NGROK_URL" == "null" ]]; then
            echo "❌ 无法获取 ngrok 公网地址"
            exit 1
          fi
          
          WSS_URL="${NGROK_URL/https:\/\//wss:\/\/}"

          echo "============================================"
          echo "✅ 服务已上线"
          echo "🔗 WebSocket 地址: ${WSS_URL}"
          echo "============================================"

          # 推送服务就绪通知
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"summary\": \"\",
              \"content\": \"✅ wss 转录服务已上线\n地址: ${WSS_URL}\",
              \"contentType\": 2,
              \"appToken\": \"${WXPUSH_TOKEN}\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"],
              \"verifyPayType\": 0,
              \"topicIds\": [],
              \"verifyPay\": false,
              \"url\": \"\"
            }"

          # 等待停止信号（由 Python 服务在空闲或任务完成后创建 /tmp/stop）
          while [ ! -f /tmp/stop ]; do
            sleep 5
          done

          STOP_REASON=$(cat /tmp/stop)
          echo "🛑 收到停止信号: $STOP_REASON"

          kill $SERVER_PID $NGROK_PID 2>/dev/null
          sleep 2

          # 推送关闭通知
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"summary\": \"\",
              \"content\": \"🛑 wss 转录服务已关闭\n原因: ${STOP_REASON}\",
              \"contentType\": 2,
              \"appToken\": \"${WXPUSH_TOKEN}\",
              \"uids\": [\"UID_KBXInZxCNq5gyruvkqaFhZ1cyAlX\"],
              \"verifyPayType\": 0,
              \"topicIds\": [],
              \"verifyPay\": false,
              \"url\": \"\"
            }"

      - name: Upload artifacts (logs and results)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transcription-artifacts-${{ github.run_id }}
          path: |
            logs/
            recognized_text.txt
            transcription_summary.txt
            no_results.txt
          retention-days: 7
          if-no-files-found: ignore