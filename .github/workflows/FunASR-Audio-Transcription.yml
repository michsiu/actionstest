name: FunASR Audio Transcription

on:
  schedule:
    - cron: '22 22 * * *'
  workflow_dispatch:
    inputs:
      audio_file:
        description: '音频文件名（位于仓库根目录）'
        required: true
        default: 'sample.wav'
        type: string
  push:
    paths:
      - '.github/workflows/funasr-transcribe.yml'
      - '*.wav'
      - '*.mp3'
      - '*.m4a'
      - '*.mp4'  # 新增 MP4 支持
permissions:
  contents: write

jobs:
  refresh-cache:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache FunASR models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/modelscope
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/funasr
          key: funasr-models-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            funasr-models-

      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ffmpeg
          key: ffmpeg-${{ runner.os }}-${{ hashFiles('scripts/ffmpeg-version.txt') }}
          restore-keys: |
            ffmpeg-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (cache refresh only)
        run: |
          python -m pip install --upgrade pip
          pip install funasr modelscope torch torchaudio

      - name: Install ffmpeg
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version

      - name: Preload models to refresh cache
        run: |
          cat > preload_models.py << 'EOF'
          import sys
          import logging
          logging.basicConfig(level=logging.INFO, stream=sys.stdout)
          print("=== Cache Refresh Started ===")
          from funasr import AutoModel
          print("Loading ASR model...")
          model = AutoModel(
              model="damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-pytorch",
              disable_update=True
          )
          print("ASR model cached successfully")
          print("Loading punctuation model...")
          punc_model = AutoModel(
              model="damo/punc_ct-transformer_zh-cn-common-vocab272727-pytorch",
              disable_update=True
          )
          print("Punctuation model cached successfully")
          print("=== Cache Refresh Completed ===")
          EOF
          python preload_models.py 2>&1 | tee cache_refresh.log

      - name: Save cache refresh log
        uses: actions/upload-artifact@v4
        with:
          name: cache-refresh-log-${{ github.run_id }}
          path: cache_refresh.log
          retention-days: 1

  transcribe-audio:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 新增步骤：自动查找音频/视频文件
      - name: Find audio/video files
        id: find-files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发，使用输入的文件名
            echo "FILE=${{ github.event.inputs.audio_file }}" >> $GITHUB_OUTPUT
          else
            # Push 触发，自动查找新增/修改的音频文件
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only --diff-filter=AM HEAD)
            AUDIO_FILE=$(echo "$CHANGED_FILES" | grep -E '\.(wav|mp3|m4a|mp4)$' | head -1)
            if [ -z "$AUDIO_FILE" ]; then
              echo "No audio/video files found in the latest commit"
              echo "SKIP=true" >> $GITHUB_OUTPUT
            else
              echo "Found file: $AUDIO_FILE"
              echo "FILE=$AUDIO_FILE" >> $GITHUB_OUTPUT
              echo "SKIP=false" >> $GITHUB_OUTPUT
            fi
          fi

      # 如果没有找到音频文件，跳过后续步骤
      - name: Skip if no files
        if: steps.find-files.outputs.SKIP == 'true'
        run: |
          echo "No audio/video files to process, exiting gracefully"
          exit 0

      - name: Cache FunASR models
        if: steps.find-files.outputs.SKIP != 'true'
        id: cache-models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/modelscope
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/funasr
          key: funasr-models-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            funasr-models-

      - name: Cache ffmpeg
        if: steps.find-files.outputs.SKIP != 'true'
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ffmpeg
          key: ffmpeg-${{ runner.os }}-${{ hashFiles('scripts/ffmpeg-version.txt') }}
          restore-keys: |
            ffmpeg-${{ runner.os }}-

      - name: Set up Python
        if: steps.find-files.outputs.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: steps.find-files.outputs.SKIP != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install funasr modelscope torch torchaudio

      - name: Install ffmpeg
        if: steps.find-files.outputs.SKIP != 'true'
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version

      - name: Run audio transcription
        if: steps.find-files.outputs.SKIP != 'true'
        env:
          AUDIO_FILE: ${{ steps.find-files.outputs.FILE }}
        run: |
          cat > transcribe.py << 'EOF'
          import sys
          import os
          import logging
          import subprocess
          from datetime import datetime
          from funasr import AutoModel
          
          logging.basicConfig(
              level=logging.INFO,
              format='%(asctime)s - %(levelname)s - %(message)s',
              handlers=[
                  logging.FileHandler('transcription.log'),
                  logging.StreamHandler(sys.stdout)
              ]
          )
          
          audio_file = os.environ.get('AUDIO_FILE', 'audio.mp3')
          
          if not os.path.exists(audio_file):
              logging.error(f"Audio file not found: {audio_file}")
              logging.info(f"Current directory contents: {os.listdir('.')}")
              sys.exit(1)
          
          # === 新增：MP4 转音频处理 ===
          file_ext = os.path.splitext(audio_file)[1].lower()
          if file_ext in ['.mp4', '.m4a']:
              logging.info(f"Converting {audio_file} to WAV audio...")
              wav_file = audio_file.rsplit('.', 1)[0] + '_converted.wav'
              cmd = [
                  'ffmpeg', '-i', audio_file,
                  '-vn',               # 不要视频
                  '-acodec', 'pcm_s16le',  # 标准 WAV 编码
                  '-ar', '16000',       # 16kHz 采样率（FunASR 要求）
                  '-ac', '1',           # 单声道
                  '-y',                 # 覆盖已有文件
                  wav_file
              ]
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  logging.error(f"FFmpeg conversion failed: {result.stderr}")
                  sys.exit(1)
              logging.info(f"Conversion successful: {wav_file}")
              audio_file = wav_file
          
          logging.info(f"Starting transcription for: {audio_file}")
          
          try:
              logging.info("Loading ASR model...")
              model = AutoModel(
                  model="damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-pytorch",
                  vad_model="damo/speech_fsmn_vad_zh-cn-16k-common-pytorch",
                  punc_model="damo/punc_ct-transformer_zh-cn-common-vocab272727-pytorch",
                  disable_update=True
              )
              logging.info("Models loaded successfully")
              
              logging.info(f"Processing audio file: {audio_file}")
              result = model.generate(input=audio_file, batch_size_s=300)
              
              if result and len(result) > 0:
                  transcribed_text = result[0].get('text', 'No text output')
                  logging.info(f"Transcription result: {transcribed_text}")
              else:
                  transcribed_text = "No result returned from model"
                  logging.warning("Empty result from model")
              
              with open('recognized_text.txt', 'w', encoding='utf-8') as f:
                  f.write(f"Audio file: {audio_file}\n")
                  f.write(f"Transcription time: {datetime.now().isoformat()}\n")
                  f.write(f"\nRecognized Text:\n{transcribed_text}\n")
              
              logging.info("Results saved to recognized_text.txt")
              
          except Exception as e:
              logging.error(f"Transcription failed: {str(e)}")
              import traceback
              logging.error(traceback.format_exc())
              sys.exit(1)
          
          print("\n=== Transcription Completed ===")
          EOF
          
          python transcribe.py 2>&1 | tee -a full_run.log

      - name: Commit transcription results
        if: steps.find-files.outputs.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recognized_text.txt full_run.log transcription.log 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update transcription results [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload transcription artifacts
        if: steps.find-files.outputs.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: transcription-results-${{ github.run_id }}
          path: |
            recognized_text.txt
            full_run.log
            transcription.log
          retention-days: 7
