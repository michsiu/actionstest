name: Simple Git Diff Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Test diff commands
        run: |
          echo "=== 测试1: HEAD~1 HEAD ==="
          git diff --name-only HEAD~1 HEAD
          
          echo ""
          echo "=== 测试2: HEAD~2 HEAD ==="
          git diff --name-only HEAD~2 HEAD
          
          echo ""
          echo "=== 测试3: 查看最近5次提交 ==="
          git log --oneline -5
          
          echo ""
          echo "=== 测试4: 检查特定文件历史 ==="
          git log --oneline -- VideoUrlTask.txt
          
          echo ""
          echo "=== 测试5: 查看文件变化详情 ==="
          git diff HEAD~1 HEAD --stat