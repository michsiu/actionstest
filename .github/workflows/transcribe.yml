name: Docker FunASR Audio Transcription

on:
  workflow_dispatch:
    inputs:
      audio_file:
        description: '音频文件名（可选，留空则使用 VideoUrlTask.txt）'
        required: false
        default: ''
        type: string
  push:
    paths:
      - '*.wav'
      - '*.mp3'
      - '*.m4a'
      - '*.mp4'
      - 'VideoUrlTask.txt'

env:
  IMAGE_NAME: funasr-transcriber

jobs:
  transcribe-audio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ========== 查找音频文件或URL任务 ==========
      - name: Find audio/video files or URL tasks
        id: find-files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.audio_file }}" ]; then
              echo "MODE=single" >> $GITHUB_OUTPUT
              echo "FILE=${{ github.event.inputs.audio_file }}" >> $GITHUB_OUTPUT
              echo "SKIP=false" >> $GITHUB_OUTPUT
              echo "Source: workflow_dispatch input" >> $GITHUB_STEP_SUMMARY
            elif [ -f "VideoUrlTask.txt" ]; then
              echo "MODE=url" >> $GITHUB_OUTPUT
              echo "SKIP=false" >> $GITHUB_OUTPUT
              echo "Source: VideoUrlTask.txt (workflow_dispatch)" >> $GITHUB_STEP_SUMMARY
            else
              echo "SKIP=true" >> $GITHUB_OUTPUT
              echo "⚠️ No audio file specified and no VideoUrlTask.txt found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            # Push 事件
            CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD 2>/dev/null || echo "")
            
            # 检查是否有 VideoUrlTask.txt 变更
            if echo "$CHANGED" | grep -q "VideoUrlTask.txt"; then
              echo "MODE=url" >> $GITHUB_OUTPUT
              echo "SKIP=false" >> $GITHUB_OUTPUT
              echo "✅ Found VideoUrlTask.txt in push" >> $GITHUB_STEP_SUMMARY
            else
              # 查找音频文件
              AUDIO_FILE=$(echo "$CHANGED" | grep -iE '\.(wav|mp3|m4a|mp4)$' | head -1)
              if [ -z "$AUDIO_FILE" ]; then
                echo "SKIP=true" >> $GITHUB_OUTPUT
                echo "⚠️ No audio files or VideoUrlTask.txt in this push, skipping." >> $GITHUB_STEP_SUMMARY
              else
                echo "MODE=single" >> $GITHUB_OUTPUT
                echo "FILE=$AUDIO_FILE" >> $GITHUB_OUTPUT
                echo "SKIP=false" >> $GITHUB_OUTPUT
                echo "✅ Found: $AUDIO_FILE" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          fi

      - name: Skip (no tasks)
        if: steps.find-files.outputs.SKIP == 'true'
        run: |
          echo "Nothing to transcribe."
          exit 0

      # ========== 登录并拉取镜像 ==========
      - name: Login to GitHub Container Registry
        if: steps.find-files.outputs.SKIP != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        if: steps.find-files.outputs.SKIP != 'true'
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          echo "✅ Image pulled." >> $GITHUB_STEP_SUMMARY

      # ========== URL模式运行转录 ==========
      - name: Run URL-based transcription
        if: steps.find-files.outputs.SKIP != 'true' && steps.find-files.outputs.MODE == 'url'
        run: |
          echo "🚀 Running URL batch transcription mode"
          # 先显示任务文件内容
          echo "📋 Task file content:"
          cat VideoUrlTask.txt
          echo ""
          
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            python3 transcribe.py 2>&1 | tee ${{ github.workspace }}/full_run.log
          
          echo "✅ URL batch transcription done." >> $GITHUB_STEP_SUMMARY

      # ========== 单文件模式运行转录 ==========
      - name: Run single file transcription
        if: steps.find-files.outputs.SKIP != 'true' && steps.find-files.outputs.MODE == 'single'
        env:
          AUDIO_FILE: ${{ steps.find-files.outputs.FILE }}
        run: |
          echo "🚀 Running single file transcription mode"
          
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            -e AUDIO_FILE="$AUDIO_FILE" \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            python3 transcribe.py 2>&1 | tee ${{ github.workspace }}/full_run.log
          
          echo "✅ Single file transcription done." >> $GITHUB_STEP_SUMMARY

      # ========== 提交结果 ==========
      - name: Commit transcription results
        if: steps.find-files.outputs.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有结果文件，包括下载的目录
          git add recognized_text.txt full_run.log transcription.log downloads/ 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 判断提交信息
            if [ "${{ steps.find-files.outputs.MODE }}" = "url" ]; then
              COMMIT_MSG="Update URL batch transcription results [skip ci]"
            else
              COMMIT_MSG="Update transcription results [skip ci]"
            fi
            git commit -m "$COMMIT_MSG"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 上传制品 ==========
      - name: Upload transcription artifacts
        if: steps.find-files.outputs.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: transcription-results-${{ github.run_id }}
          path: |
            recognized_text.txt
            full_run.log
            transcription.log
            downloads/
          retention-days: 7
