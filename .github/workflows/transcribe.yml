name: Docker FunASR Audio Transcription

on:
  workflow_dispatch:
    inputs:
      audio_file:
        description: '音频文件名'
        required: false
        default: ''
        type: string
  push:
    paths:
      - '*.wav'
      - '*.mp3'
      - '*.m4a'
      - '*.mp4'
      - 'VideoUrlTask.txt'

env:
  IMAGE_NAME: funasr-transcriber

jobs:
  transcribe-audio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ========== 判断是否有任务 ==========
      - name: Check for tasks
        id: check-tasks
        run: |
          if [ -f "VideoUrlTask.txt" ]; then
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "🔗 Found VideoUrlTask.txt" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "Source: workflow_dispatch" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD 2>/dev/null || echo "")
          AUDIO_FILE=$(echo "$CHANGED" | grep -iE '\.(wav|mp3|m4a|mp4)$' | head -1)
          if [ -z "$AUDIO_FILE" ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "⚠️ No audio files, skipping." >> $GITHUB_STEP_SUMMARY
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "✅ Found: $AUDIO_FILE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Skip
        if: steps.check-tasks.outputs.SKIP == 'true'
        run: exit 0

      # ========== 登录拉取镜像 ==========
      - name: Login to GitHub Container Registry
        if: steps.check-tasks.outputs.SKIP != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        if: steps.check-tasks.outputs.SKIP != 'true'
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          echo "✅ Image pulled." >> $GITHUB_STEP_SUMMARY

      # ========== 运行转录 ==========
      - name: Run transcription
        if: steps.check-tasks.outputs.SKIP != 'true'
        env:
          AUDIO_FILE: ${{ github.event.inputs.audio_file || '' }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            -e AUDIO_FILE="$AUDIO_FILE" \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            python3 transcribe.py 2>&1 | tee ${{ github.workspace }}/full_run.log
          echo "✅ Done." >> $GITHUB_STEP_SUMMARY

      # ========== 提交结果 ==========
      - name: Commit results
        if: steps.check-tasks.outputs.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recognized_text.txt full_run.log transcription.log VideoUrlTask.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update transcription results [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 上传制品 ==========
      - name: Upload artifacts
        if: steps.check-tasks.outputs.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: transcription-results-${{ github.run_id }}
          path: |
            recognized_text.txt
            full_run.log
            transcription.log
          retention-days: 7